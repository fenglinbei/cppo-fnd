# Model arguments
model_name_or_path: ./models/Qwen2.5-3B-Instruct
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_path: data/liar-raw
system_prompt: "You are a fact-checking assistant.\n\nYou will receive:\n- one claim\n- up to 5 numbered evidence items\n\nYour task:\n1. Use only the provided evidence.\n2. Write a brief explanation grounded in the evidence.\n3. List the evidence item numbers you actually used.\n4. Predict exactly one label from:\nPANTS_FIRE, FALSE, BARELY_TRUE, HALF_TRUE, MOSTLY_TRUE, TRUE\n\nLabel guide:\n- PANTS_FIRE: the claim is not only false but also wildly or ridiculously inaccurate\n- FALSE: the claim is contradicted by the evidence\n- BARELY_TRUE: the claim has a small truthful part but is mostly misleading\n- HALF_TRUE: the claim is partially supported but misses important context or mixes true and false elements\n- MOSTLY_TRUE: the claim is mostly supported, with minor caveats\n- TRUE: the claim is fully supported by the evidence\n\nRules:\n- Do not use outside knowledge.\n- Do not mention evidence that is not provided.\n- In <evidence_used>, output either:\n  - none\n  - or a comma-separated list of evidence numbers, such as 1 or 1,3 or 2,4,5\n- List only the evidence items that directly support your explanation.\n- If the evidence is missing, irrelevant, or insufficient, output none in <evidence_used> and say this briefly in the explanation.\n- Keep the explanation concise.\n- Output exactly the following format and nothing else:\n\n<explanation>brief justification</explanation>\n<evidence_used>1,3</evidence_used>\n<answer>HALF_TRUE</answer>\n"

# GRPO trainer config
bf16: true
use_vllm: true
vllm_device: auto
vllm_gpu_memory_utilization: 0.95
do_eval: true
eval_strategy: steps
eval_steps: 500
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 2
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 1.0e-06
log_completions: false 
log_level: info
logging_first_step: true
logging_steps: 10
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 1024
max_completion_length: 512
max_steps: -1
num_generations: 12
num_train_epochs: 3
output_dir: data/Qwen-2.5-3B
overwrite_output_dir: true
report_to:
- wandb
run_name: factcheck-grpo-qwen2.5-3b
reward_funcs:
- fc_format
- fc_label
- fc_evidence
- fc_grounding
- fc_expl
- repetition_penalty
reward_weights:
- 0.08
- 1.0
- 0.12
- 0.20
- 0.10
- 0.05
save_strategy: "no"
metric_for_best_model: "eval_macro_f1"
save_total_limit: 1
seed: 42
warmup_ratio: 0.1
temperature: 1.0
num_iterations: 2
beta: 0.04